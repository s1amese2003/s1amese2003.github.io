<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - 我的主页</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="blog.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">我的博客</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">返回主页</a></li>
                <li><a href="#" class="nav-link" id="newPostBtn">写文章</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 博客主区域 -->
    <main class="blog-main">
        <div class="container">
            <!-- 搜索和筛选 -->
            <div class="blog-header">
                <h1>我的博客</h1>
                <div class="blog-controls">
                    <input type="text" id="searchInput" placeholder="搜索文章..." class="search-input">
                    <select id="categoryFilter" class="category-filter">
                        <option value="all">全部分类</option>
                        <option value="技术">技术</option>
                        <option value="生活">生活</option>
                        <option value="学习">学习</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>

            <!-- 文章列表 -->
            <div class="blog-content">
                <div class="posts-grid" id="postsContainer">
                    <!-- 文章卡片将通过JavaScript动态生成 -->
                </div>

                <!-- 空状态 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <p>还没有文章，点击"写文章"创建第一篇吧！</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 新建/编辑文章模态框 -->
    <div class="modal" id="postModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">写文章</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <form id="postForm">
                <div class="form-group">
                    <label for="postTitle">标题</label>
                    <input type="text" id="postTitle" required placeholder="输入文章标题...">
                </div>
                <div class="form-group">
                    <label for="postCategory">分类</label>
                    <select id="postCategory" required>
                        <option value="技术">技术</option>
                        <option value="生活">生活</option>
                        <option value="学习">学习</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="postContent">内容</label>
                    <textarea id="postContent" rows="15" required placeholder="开始写作..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary">发布</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 文章详情模态框 -->
    <div class="modal" id="postDetailModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <button class="close-btn" id="closeDetailModal">&times;</button>
            </div>
            <article class="post-detail" id="postDetail">
                <!-- 文章详情将通过JavaScript动态生成 -->
            </article>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 你的名字. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
    <script src="blog.js"></script>
</body>
</html>
